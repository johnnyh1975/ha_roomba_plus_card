# Generated by aurora@aurora-smart-home (ha-integration-dev skill)
# https://github.com/tonylofgren/aurora-smart-home
clean_room:
  name: Clean room
  description: >
    Start a targeted clean of one or more named rooms on smart-map robots
    (i7, s9, j-series). Room names must match the labels assigned in the
    Roomba+ options. All rooms must be on the same floor.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum
  fields:
    room_name:
      name: Room name
      description: >
        Name of the room to clean, or a list of room names to clean in
        sequence. Names are matched case-insensitively against the labels
        you assigned in the Roomba+ options.
      required: true
      example: "Kitchen"
      selector:
        text:
    ordered:
      name: Ordered sequence
      description: >
        When cleaning multiple rooms, clean them in the order supplied
        rather than letting the robot choose its own sequence.
        Has no effect when a single room is given.
      required: false
      default: true
      selector:
        boolean:

reset_filter:
  name: Reset filter
  description: >
    Record the current time as the filter replacement date and restart the
    remaining-life counter. Use after physically replacing the filter.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

reset_brush:
  name: Reset brushes
  description: >
    Record the current time as the brush replacement date and restart the
    remaining-life counter. Use after physically replacing the brush roll.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

reset_battery:
  name: Reset battery
  description: >
    Record the current time as the battery replacement date.
    Use after physically replacing the battery pack.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

reset_pad:
  name: Reset cleaning pad
  description: >
    Record the current time as the pad replacement date (Braava mops only).
    Use after replacing the reusable or disposable cleaning pad.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

smart_start:
  name: Smart start
  description: >
    Start a clean with blocking-sensor checks. If any configured blocking
    sensors are active, the start is queued or aborted depending on the
    integration configuration. Use in automations instead of vacuum.start
    when you want to prevent cleaning while doors are open or rooms occupied.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum
  fields:
    rooms:
      name: Rooms
      description: >
        Optional list of room names to clean (SMART robots only).
        Names must match the labels configured in Roomba+ options.
      required: false
      selector:
        text:
          multiple: true
    override_blocking:
      name: Override blocking sensors
      description: >
        When true, start immediately even if blocking sensors are active.
        Useful for manual overrides in time-sensitive situations.
      required: false
      default: false
      selector:
        boolean:
