rules:
  # ── Bronze ────────────────────────────────────────────────────────────────
  action-setup:
    status: done
    comment: >
      All services (reset_filter, reset_brush, reset_battery, reset_pad,
      clean_room, smart_start) registered in async_setup_entry, not at
      module level.
  appropriate-polling:
    status: done
    comment: >
      Integration is local_push (MQTT). Cloud coordinator polls on a 24h
      interval — appropriate for slowly-changing pmap/favorites data.
  brands:
    status: todo
    comment: >
      Brand assets (icon.png, icon@2x.png) prepared in brands_submission/.
      Requires manual PR to github.com/home-assistant/brands after v2.0 release.
      Cannot be automated — marked todo until PR is merged.
  common-modules:
    status: done
    comment: >
      entity.py (IRobotEntity base), models.py (RoombaData, MapCapability),
      const.py (all constants), separate store modules for mission/maintenance/
      zone/geometry data.
  config-flow:
    status: done
    comment: Full config flow with DHCP/Zeroconf discovery and options flow.
  config-flow-test-coverage:
    status: done
    comment: >
      11 integration tests in tests_integration/ using pytest-homeassistant-custom-component.
      Covers async_migrate_entry (v1→v2), config flow error handling, reconfigure flow
      (form display + cannot_connect error), and options flow menu routing + settings save.
      Stub-based suite (1022 tests) retained in tests/ with separate pytest.ini.
  dependency-transparency:
    status: done
    comment: roombapy==1.9.1 pinned in manifest.requirements.
  docs-actions:
    status: done
    comment: >
      services.yaml documents all 6 actions with field descriptions, selectors,
      and examples. README actions table added in v2.0.
  docs-configuration-parameters:
    status: done
    comment: >
      README Configuration parameters section documents all options: connection
      settings, map, blocking sensors, presence scheduling, cloud credentials,
      and reconfiguration flow.
  docs-installation-instructions:
    status: done
    comment: README covers HACS and manual install.
  entity-event-setup:
    status: done
    comment: >
      All entity state updates driven by roombapy MQTT callbacks via
      new_state_filter + schedule_update_ha_state(). No polling in entities.
  entity-unique-id:
    status: done
    comment: All entities set _attr_unique_id in __init__.
  has-entity-name:
    status: done
    comment: All entities use translation_key + strings.json — no hardcoded names.
  runtime-data:
    status: done
    comment: >
      All runtime state in config_entry.runtime_data (RoombaData dataclass).
      No hass.data[DOMAIN] usage anywhere.
  test-before-setup:
    status: done
    comment: >
      MQTT connection established and confirmed before async_setup_entry
      returns. Cloud coordinator failure is caught and logged — local MQTT
      always succeeds or raises ConfigEntryNotReady.
  unique-config-entry:
    status: done
    comment: BLID used as unique_id in config flow — prevents duplicate entries.

  # ── Silver ────────────────────────────────────────────────────────────────
  action-exceptions:
    status: done
    comment: Services raise ServiceValidationError with translation keys.
  config-entry-unloading:
    status: done
    comment: async_unload_entry implemented — unloads all platforms cleanly.
  docs-supported-functions:
    status: done
    comment: >
      README features section documents all 69 local + 9 cloud sensors,
      binary sensors, controls, maps, zones, and v2.0 cloud diagnostics.
      REST API section documents both format=summary and format=records.
  entity-translations:
    status: done
    comment: >
      102 entity keys across sensor, binary_sensor, select, button platforms.
      7 languages (EN/DE/FR/ES/IT/NL/PT). All keys present in strings.json
      and all translation files.
  integration-owner:
    status: done
    comment: codeowners set in manifest.
  log-when-unavailable:
    status: done
    comment: >
      Disconnect logged by roombapy at WARNING level. Reconnect attempts
      logged at INFO. Cloud failures logged at WARNING.
  parallel-updates:
    status: done
    comment: >
      MQTT push integration — no coordinator polling for local data.
      Entities update independently via new_state_filter callbacks.
  reauthentication-flow:
    status: done
    comment: Cloud coordinator raises ConfigEntryAuthFailed on auth failure.
  test-coverage:
    status: done
    comment: >
      1022 unit tests across 32 test files. Stub-based — no HA install
      required. Covers all stores, sensors, cloud coordinator, services,
      callbacks, migration, classification, REST API, and backfill logic.

  # ── Gold ──────────────────────────────────────────────────────────────────
  devices:
    status: done
    comment: Single DeviceInfo per robot in IRobotEntity base class.
  diagnostics:
    status: done
    comment: diagnostics.py exposes full runtime state as downloadable JSON.
  discovery:
    status: done
    comment: DHCP (4 MAC prefixes) and Zeroconf discovery configured.
  docs-high-level-description:
    status: done
    comment: >
      README introduction updated for v2.0 — describes local-push architecture,
      Gold Quality Scale, v2.0 cloud diagnostics scope, and version history.
  entity-category:
    status: done
    comment: >
      All non-primary entities use EntityCategory.DIAGNOSTIC or CONFIG.
      Primary vacuum control has no category (visible by default).
  entity-disabled-by-default:
    status: done
    comment: >
      Opt-in diagnostic sensors (nav_panics, cliff counters, battery_capacity,
      rssi, snr, ip_address) set entity_registry_enabled_default=False.
  exception-translations:
    status: done
    comment: All ServiceValidationError and ConfigEntryAuthFailed use translation keys.
  icon-translations:
    status: done
    comment: >
      icons.json created with 98 entity icons across sensor (75), button (14),
      select (6), and switch (3) platforms. All _attr_icon and icon= assignments
      removed from entity files — icons served via frontend translation system.
  reconfiguration-flow:
    status: done
    comment: >
      async_step_reconfigure implemented — users can change host/password without
      removing the entry. Validates connection before applying. Reloads entry on success.
  repair-issues:
    status: done
    comment: repairs.py raises RepairIssues for dock drift, unconfirmed zones, cloud auth.
  stale-devices:
    status: done
    comment: >
      async_remove_config_entry_devices implemented. Each config entry manages
      one robot device — any device presented for removal is safe to remove.
  strict-typing:
    status: done
    comment: >
      All functions and methods have return type annotations. All parameters typed.
      from __future__ import annotations in all 27 source files.

  # ── Platinum ─────────────────────────────────────────────────────────────
  async-dependency:
    status: done
    comment: roombapy is async-capable via paho-MQTT thread. Cloud via aiohttp.
  inject-websession:
    status: done
    comment: Cloud API uses async_get_clientsession(hass) — no standalone sessions.
  migration:
    status: done
    comment: >
      async_migrate_entry implemented. Config entry bumped to version 2.
      v1 → v2 adds cloud_raw_records_version marker. All existing user data preserved.
  test-before-configure:
    status: done
    comment: MQTT credentials verified during config flow before entry is created.
